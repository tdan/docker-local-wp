services:
  # Database
  db:
    image: mariadb
    container_name: wp_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "18766:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
    restart: unless-stopped
    networks:
      - net
  # Wordpress
  wp-fpm:
    depends_on:
      - db
    image: wordpress:fpm-alpine
    container_name: wp_fpm
    user: "0:0"
    expose:
      - 9000
    volumes:
      - www_data:/var/www/html
      - ./app:/var/www/html/wp-content:rw
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./error-logging.ini:/usr/local/etc/php/conf.d/error-logging.ini
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${SQL_DB}
      WORDPRESS_DB_USER: ${SQL_USER}
      WORDPRESS_DB_PASSWORD: ${SQL_PASSWORD}
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        define( 'FS_METHOD', 'direct' );
        @ini_set( 'display_errors', 0 );
    restart: unless-stopped
    networks:
      - net
  # NGINX
  nginx:
    depends_on:
      - wp-fpm
    image: nginx:alpine
    ports:
      - "18765:80"
    volumes:
      - www_data:/var/www/html
      - ./app:/var/www/html/wp-content:rw
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx/error.log:/var/log/nginx/error.log:rw
      - ./logs/nginx/access.log:/var/log/nginx/access.log:rw
    networks:
      - net
  # Adminer
  adminer:
    image: adminer
    container_name: wp_adminer
    ports:
      - "18767:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    restart: always
    networks:
      - net
    depends_on:
      - db
  # WP-CLI
  wpcli:
    image: wordpress:cli
    links:
      - db:db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${SQL_DB}
      WORDPRESS_DB_USER: ${SQL_USER}
      WORDPRESS_DB_PASSWORD: ${SQL_PASSWORD}
    volumes_from:
      - wp-fpm
    depends_on:
      - db
      - wp-fpm
    networks:
      - net
networks:
  net:
    driver: bridge
volumes:
  www_data:
  db_data:
